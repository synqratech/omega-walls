retriever:
  backend: sqlite_fts
  sqlite_fts:
    source_root: data/smoke_sources/domain_docs
    include_extensions: [".txt", ".md", ".html", ".htm", ".pdf", ".docx"]
    default_top_k: 4
    attachments:
      enabled: true
      max_file_bytes: 20971520
      max_extracted_chars: 200000
      max_chunk_chars: 2000
      chunk_overlap: 200
      html_include_hidden: true
      hidden_chunk_prefix: "[hidden_html]"
      scan_like_min_chars_per_page: 25
      scan_like_min_alpha_ratio: 0.30
      zip:
        enabled: false
        max_files: 100
        max_depth: 5
        max_total_bytes: 20971520
        allow_encrypted: false
  external:
    enabled: false
