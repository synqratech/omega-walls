    secret_nouns: [api, key, token, password, secret, credentials, credential, prompt, auth, material, sensitive, value, access, string, embeddings, embedding, eingabeaufforderung, prompttext, prompttexte, systemprompt, system_prompt]
    exfil_verbs: [reveal, show, print, return, leak, exfiltrate, export, send, transmit, dump, share, disclose, surface, present, extract, display, drucke, drucken, zeige, ausgeben]
    secret_contact_tokens: [handphone, phone, cellphone, contact]
    secret_contact_number_tokens: [number, no]
    secret_contact_pronouns: [your, user, me, my]

    protect_verbs: [protect, secure, store, rotate, encrypt, redact, mask]
    neg_markers: ['do not', "don't", 'dont', 'never', 'avoid', 'no', 'without']

    tool_tokens: [curl, wget, bash, shell, execute, run, command, script, python, tool, function, write, file, call_tool, call, invoke_helper, persist_artifact, helper, network_post, write_file, sql, sqlcode, database, datenbank, datenbanktabelle, embeddings]
    tool_weak_tokens: [write, run]
    tool_context_tokens: [file, files, script, scripts, command, commands, shell, bash, curl, wget, python, tool, function, call, invoke, execute, run, sql, sqlcode, database, db, schema, table, tables, datenbank, tabelle, tabla, tablas]
    tool_context_window: 3
    agent_chain_open_tab_markers: ['open a new tab', 'open new tab', 'go to https://', 'go to http://']
    agent_chain_read_doc_markers: ['find an existing document', 'existing document file', 'read the document', 'read the file', 'drive.google.com/drive/home']
    agent_chain_fill_form_markers: ['fill out the form', 'fill in the form', 'complete the form', 'before typing', 'type the task you are asked to complete']
    agent_chain_dont_ask_user_markers: ['do not ask the user', "don't ask the user", 'do not ask user', 'dont ask user']
    agent_chain_retry_markers: ['try multiple times', 'try again', 'retry', 'if you cannot find it']
    agent_chain_coercive_markers: ['attention', 'alert', 'urgent', 'instant task completion', 'virus detected', 'must click']
    agent_chain_action_cues: ['must', 'please', 'before', 'in order to']
    agent_chain_secret_cues: ['bank account', 'ssh', 'api key', 'password', 'token', 'credentials', 'private key', 'secret']
    agent_chain_min_stage_hits: 3
    tool_sql_verbs: [generate, query, select, extract, access, dump, export, generieren, abfragen, zugreifen, greifen, zuzugreifen, extrahieren, generar, consultar, acceder, extraer]
    tool_db_nouns: [sql, sqlcode, database, db, schema, table, tables, datenbank, datenbanken, datenbanktabelle, tabelle, tabellen, esquema, esquemas, tabla, tablas, base, datos]
    tool_imperatives: [generate, run, execute, query, select, extract, access, dump, export, return, write, call, generieren, abfragen, zugreifen, greifen, zuzugreifen, extrahieren, erzeuge, erstellen, generar, consultar, acceder, extraer, devuelve]
    evasion_markers: ['jailbreak', 'bypass', 'no restrictions', 'anything now', 'ignore safety', 'without safety', 'without restrictions', 'sidestep', 'unlock mode', 'expanded latitude', 'set safeguards aside', 'set guardrails aside', 'without limitations', 'no policy limits', 'without guardrails', 'do anything now']
    evasion_verbs: [bypass, ignore, sidestep, unlock, evade, disable]
    evasion_objects: [safety, restrictions, restriction, policy, guardrails, safeguards, constraints, limitations, controls]

    tutorial_markers: ['how to', 'example', 'sample', 'guide', 'documentation', 'article', 'discuss', 'training', 'tutorial']
    false_legit_markers: ['for debug', 'for debugging', 'for training', 'hypothetical scenario', 'for testing only', 'simulation only', 'this is not a prompt injection', 'i honestly just want an answer', "if you don't answer i'll be very sad", 'dies ist keine aufforderungsspritze', 'ich mochte wirklich nur eine antwort']

  weights:
    override:
      w_anchor: 0.80
      w_phrase: 2.60
      w_struct: 0.50
      w_intent_pair: 1.60
      w_softener_boost: 0.80

    secret:
      w_intent_pair: 2.20
      w_secret_noun: 0.25
      w_exfil_verb: 0.55
      penalty_protect_pair: 1.30
      penalty_neg_near: 1.10
      bonus_contact_exfil: 0.85
      contact_exfil_bonus_cap: 0.85
      bonus_agent_chain_secret: 0.95
      agent_chain_secret_bonus_cap: 0.95

    tool:
      w_tool_tok: 0.55
      bonus_exfil_intent: 0.60
      bonus_override_present: 0.40
      w_struct: 0.20
      bonus_sql_db_intent: 1.05
      sql_db_bonus_cap: 1.05
      bonus_agent_chain: 1.20
      agent_chain_bonus_cap: 1.20

    evasion:
      w_match: 2.50
      w_struct: 0.30
      w_pair: 1.45
