name: framework-matrix-nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "40 2 * * *"

jobs:
  workflow-layer:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[api,integrations]"

      - name: Install OpenClaw plugin dependencies
        working-directory: plugins/openclaw-omega-guard
        run: npm ci --no-audit --no-fund

      - name: Run workflow layer
        run: |
          python scripts/run_framework_matrix_stand.py --layer workflow --profile dev --strict --artifacts-root artifacts/framework_matrix_nightly

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: framework-matrix-workflow-artifacts
          path: artifacts/framework_matrix_nightly
          if-no-files-found: warn

  stress-layer:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[api,integrations]"

      - name: Run stress layer
        run: |
          python scripts/run_framework_stress_chaos.py --profile dev --strict --artifacts-root artifacts/framework_matrix_nightly

      - name: Upload stress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: framework-matrix-stress-artifacts
          path: artifacts/framework_matrix_nightly
          if-no-files-found: warn
