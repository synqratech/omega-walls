name: openclaw-plugin-ci

on:
  workflow_dispatch:
  push:
    paths:
      - "plugins/openclaw-omega-guard/**"
      - ".github/workflows/openclaw-plugin-ci.yml"
  pull_request:
    paths:
      - "plugins/openclaw-omega-guard/**"
      - ".github/workflows/openclaw-plugin-ci.yml"

jobs:
  openclaw-plugin:
    name: openclaw-plugin (node20, ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install plugin dependencies
        working-directory: plugins/openclaw-omega-guard
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        working-directory: plugins/openclaw-omega-guard
        run: npm run typecheck

      - name: Unit tests
        working-directory: plugins/openclaw-omega-guard
        run: npm run test

      - name: Build
        working-directory: plugins/openclaw-omega-guard
        run: npm run build

      - name: Mocked smoke
        working-directory: plugins/openclaw-omega-guard
        run: npm run smoke

      - name: Upload plugin dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-omega-guard-dist
          path: plugins/openclaw-omega-guard/dist
          if-no-files-found: error
