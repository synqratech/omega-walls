name: fw001-release-gate

on:
  workflow_dispatch:
  push:
    paths:
      - "omega/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/fw001-release-gate.yml"
  pull_request:
    paths:
      - "omega/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/fw001-release-gate.yml"

jobs:
  coverage-gate:
    name: coverage-gate (py3.13)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run FW-001 core suite coverage gate
        run: |
          CORE_TESTS="$(tr '\n' ' ' < tests/fw001_core_suite.txt)"
          python -m pytest $CORE_TESTS --cov=omega --cov-branch --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: fw001-coverage-xml
          path: coverage.xml
          if-no-files-found: error

  perf-gate:
    name: perf-gate (py3.13, ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run FW-001 perf gate
        run: |
          python scripts/check_fw001_perf_gate.py --baseline-file config/perf_baselines/fw001_pi0_py313_ubuntu.json --profile dev --artifacts-root artifacts/fw001_perf --perf-overhead-max 0.15 --strict

      - name: Upload perf artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fw001-perf-artifacts
          path: artifacts/fw001_perf
          if-no-files-found: error

  fw001-gate:
    name: fw001-gate
    runs-on: ubuntu-latest
    needs:
      - coverage-gate
      - perf-gate
    steps:
      - name: All FW-001 gates passed
        run: echo "FW-001 release gate passed (coverage >= 85%, perf overhead <= 15%)."
