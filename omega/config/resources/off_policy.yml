off_policy:
  version: v1
  policy_version: v1-default
  last_updated: 2026-02-18
  notes: Default reaction policy.
  enforcement_mode: ENFORCE
  canonical_path:
    blessed_path: "RAG service -> RetrieverProdAdapter -> OmegaRAGHarness -> ToolGateway"
    strict_canonical: true
  block:
    gamma: 0.70
    target: DOC

  tool_freeze:
    enabled: true
    horizon_steps: 20
    mode: TOOLS_DISABLED
    allowlist: ['retrieval_readonly', 'summarize']

  source_quarantine:
    enabled: true
    strikes_to_quarantine: 2
    duration_steps: 24
    duration_hours: 24

  cross_session:
    enabled: true
    backend: sqlite
    sqlite_path: artifacts/state/cross_session_state.db
    fallback_actor_to_session: true
    actor_ttl_steps: 400
    decay:
      mode: exponential
      half_life_steps: 120
    transfer:
      scars: true
      freeze: true
      quarantine: true
    carryover_signal:
      enabled: true
      order_tokens: [before, first, next, original, goal]
      action_markers: [upvote, like, click, vote, subscribe, share]
      min_order_hits: 2
      min_action_hits: 1
      floor_by_wall:
        override_instructions: 0.48
        tool_or_action_abuse: 0.48
    freeze_scope: actor
    quarantine_scope: global_source
    telemetry:
      hash_actor_id: true
      actor_hash_salt_env: OMEGA_ACTOR_HASH_SALT

  escalate:
    enabled: true
    always_on_exfil: true
    on_three_plus_walls: true

  severity:
    rules:
      L3_if_walls_any: [secret_exfiltration]
      L3_if_walls_count_gte: 3
      L2_if_walls_any: [tool_or_action_abuse]
      default: L1

  control_outcome:
    warn:
      enabled: false
      target: SESSION
      max_p_gte: 0.45
      sum_m_next_gte: 0.35
    require_approval:
      enabled: false
      on_off: true
      on_warn: false
      tools: ['network_post', 'write_file']
      horizon_steps: 8
  incident_artifact:
    enabled: false
    emit_for_outcomes: ['WARN', 'SOFT_BLOCK', 'SOURCE_QUARANTINE', 'TOOL_FREEZE', 'HUMAN_ESCALATE', 'REQUIRE_APPROVAL']
    include_timeline: true

logging:
  mode: OFF_ONLY
  capture_text: NEVER
  max_text_chars: 800
  allowlisted_sources: ['synthetic:', 'tests:']
