<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Quick eval snapshot</title>
  <desc id="desc">Quick suite metrics snapshot for omega-walls.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
      .sub { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #334155; }
      .axis { stroke: #475569; stroke-width: 2; }
      .bar1 { fill: #0ea5e9; }
      .bar2 { fill: #22c55e; }
      .bar3 { fill: #f59e0b; }
      .bar4 { fill: #6366f1; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #111827; }
      .value { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 700; fill: #0f172a; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; ry: 10; }
      .num { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
    </style>
  </defs>
  <rect x="0" y="0" width="1100" height="520" class="bg"/>
  <text x="34" y="46" class="title">Quick Eval Snapshot</text>
  <text x="34" y="70" class="sub">Local run on February 19, 2026 with `python -m omega eval --suite quick --strict`.</text>

  <rect x="34" y="96" width="240" height="110" class="card"/>
  <text x="54" y="130" class="label">Attack Pass Rate</text>
  <text x="54" y="175" class="num">100%</text>

  <rect x="294" y="96" width="240" height="110" class="card"/>
  <text x="314" y="130" class="label">Benign Pass Rate</text>
  <text x="314" y="175" class="num">100%</text>

  <rect x="554" y="96" width="240" height="110" class="card"/>
  <text x="574" y="130" class="label">False Positives</text>
  <text x="574" y="175" class="num">0</text>

  <rect x="814" y="96" width="240" height="110" class="card"/>
  <text x="834" y="130" class="label">Freeze Enforcement</text>
  <text x="834" y="175" class="num">100%</text>

  <line x1="80" y1="450" x2="1040" y2="450" class="axis"/>
  <line x1="80" y1="240" x2="80" y2="450" class="axis"/>
  <text x="36" y="244" class="label">1.0</text>
  <text x="36" y="350" class="label">0.5</text>
  <text x="46" y="454" class="label">0</text>

  <rect x="150" y="240" width="120" height="210" class="bar1"/>
  <rect x="360" y="240" width="120" height="210" class="bar2"/>
  <rect x="570" y="240" width="120" height="0" class="bar3"/>
  <rect x="780" y="240" width="120" height="210" class="bar4"/>

  <text x="170" y="470" class="label">attack_pass</text>
  <text x="380" y="470" class="label">benign_pass</text>
  <text x="610" y="470" class="label">fp_rate</text>
  <text x="790" y="470" class="label">freeze_rate</text>

  <text x="188" y="234" class="value">1.00</text>
  <text x="398" y="234" class="value">1.00</text>
  <text x="608" y="234" class="value">0.00</text>
  <text x="818" y="234" class="value">1.00</text>
</svg>
